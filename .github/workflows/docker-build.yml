# Builds the album-guard container image on tag pushes or manual dispatch.
# No registry push by default — enable once a registry/login step is wired up.
name: Docker build (album-guard)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip until Phase B creates album-guard/Dockerfile.
    if: ${{ hashFiles('album-guard/Dockerfile') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./album-guard
          file: ./album-guard/Dockerfile
          push: false
          tags: |
            album-guard:${{ github.ref_name }}
            album-guard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
